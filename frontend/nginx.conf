server {
    listen 80;
    client_max_body_size 0;

    root /usr/share/nginx/html;
    index 200.html;

    # API proxy to backend service inside docker network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Immutable assets (content-hashed by Vite) - cache forever
    location /_app/immutable/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: all non-file routes served by 200.html
    # HTML files must not be cached so users always get fresh version meta tags
    location / {
        try_files $uri $uri/ /200.html;
        expires -1d;
        add_header Cache-Control "no-store";
    }
}

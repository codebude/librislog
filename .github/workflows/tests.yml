name: Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "24"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --junitxml=report.xml --cov=app --cov-report=term-missing

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-backend
          path: backend/report.xml

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --junitxml=report.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-cli
          path: cli/report.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=junit --reporter=default --outputFile=report.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-frontend
          path: frontend/report.xml

  report:
    needs: [backend, cli, frontend]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Initialize git for test reporter
        run: |
          git init
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add -A
          git commit --allow-empty -m "ci"

      - name: Publish test results
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: "artifacts/**/report.xml"
          reporter: java-junit
          fail-on-error: "false"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function parseJUnit(filePath) {
              const xml = fs.readFileSync(filePath, 'utf8');
              const m = xml.match(/testsuite\s[^>]*tests="(\d+)"\s+failures="(\d+)"\s+errors="(\d+)"(?:\s+skipped="(\d+)")?/);
              if (!m) return null;
              const total = parseInt(m[1]);
              const failures = parseInt(m[2]);
              const errors = parseInt(m[3]);
              const skipped = parseInt(m[4] || '0');
              const passed = total - failures - errors - skipped;
              return { passed, failed: failures + errors, skipped, total };
            }

            const reports = {
              Backend: parseJUnit('artifacts/test-report-backend/report.xml'),
              CLI: parseJUnit('artifacts/test-report-cli/report.xml'),
              Frontend: parseJUnit('artifacts/test-report-frontend/report.xml'),
            };

            let summary = '## ✅ Test Results\n\n';
            summary += '| Suite | Passed | Failed | Skipped | Total |\n';
            summary += '|-------|--------|--------|---------|-------|\n';
            let totalPassed = 0, totalFailed = 0, totalSkipped = 0, totalAll = 0;
            let anyFailed = false;

            for (const [name, r] of Object.entries(reports)) {
              if (!r) {
                summary += `| ${name} | ⚠️ No report | - | - | - |\n`;
                continue;
              }
              const status = r.failed > 0 ? '❌' : '✅';
              if (r.failed > 0) anyFailed = true;
              summary += `| ${name} | ${r.passed} | ${r.failed > 0 ? `**${r.failed}**` : '0'} | ${r.skipped} | ${r.total} |\n`;
              totalPassed += r.passed;
              totalFailed += r.failed;
              totalSkipped += r.skipped;
              totalAll += r.total;
            }

            summary += `| **Total** | **${totalPassed}** | **${totalFailed}** | **${totalSkipped}** | **${totalAll}** |\n\n`;
            summary += anyFailed
              ? '❌ Some tests failed. Check the **Test Results** check run for details.'
              : '✅ All tests passed.';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });

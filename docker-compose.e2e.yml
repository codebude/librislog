name: librislog-e2e

services:
  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-v0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "8002:8000"
    volumes:
      - ./data-e2e:/app/data
    environment:
      DATABASE_URL: sqlite:///./data/librislog.db
      API_KEY_ENCRYPTION_KEY: zK7qP9mX2vR5tW8yA4cF6hJ1lN3pS0uB # dummy key for testing purposes only
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_DEFAULT_LOCALE: ${PUBLIC_DEFAULT_LOCALE:-en}
        APP_VERSION: ${APP_VERSION:-v0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "8003:80"
    depends_on:
      backend:
        condition: service_healthy

  test-runner:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    depends_on:
      frontend:
        condition: service_started
    environment:
      E2E_BASE_URL: http://frontend:80
      E2E_BACKEND_URL: http://backend:8000/api/health
    volumes:
      - ./frontend/playwright-report:/app/frontend/playwright-report
      - ./frontend/test-results:/app/frontend/test-results
